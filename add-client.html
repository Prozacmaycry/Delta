<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление клиента</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- Навигация -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6 flex gap-4">
            <a href="add-client.html" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                <i class="fas fa-plus-circle mr-2"></i>Добавить клиента
            </a>
            <a href="search-clients.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                <i class="fas fa-search mr-2"></i>Поиск клиентов
            </a>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-8 flex items-center gap-3">
                <i class="fas fa-user-plus text-green-600"></i>
                Добавить нового клиента
            </h1>
            
            <!-- Форма добавления -->
            <form id="clientForm" class="space-y-6">
                <!-- ФИО -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">
                        <i class="fas fa-user text-gray-400 mr-2"></i>ФИО клиента
                    </label>
                    <input type="text" 
                           id="fullName"
                           required
                           placeholder="Иванов Иван Иванович"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>

                <!-- Телефон -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">
                        <i class="fas fa-phone text-gray-400 mr-2"></i>Номер телефона
                    </label>
                    <input type="tel" 
                           id="phoneNumber"
                           required
                           placeholder="+7 (999) 123-45-67"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    <p class="text-sm text-gray-500 mt-1">В любом формате, главное чтобы был номер</p>
                </div>

                <!-- Тариф и срок в одной сетке -->
                <div class="grid grid-cols-2 gap-4">
                    <!-- Тариф -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">
                            <i class="fas fa-tag text-gray-400 mr-2"></i>Тариф
                        </label>
                        <select id="tariff" 
                                required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-white">
                            <option value="">Выберите тариф</option>
                            <option value="Стандарт на месяц">📅 Стандарт на месяц</option>
                            <option value="Школьный на месяц">🎒 Школьный на месяц</option>
                            <option value="Халявный месяц">🎁 Халявный месяц</option>
                            <option value="3 месяца">📆 3 месяца</option>
                            <option value="Полугодовой безлимит">⚡ Полугодовой безлимит</option>
                            <option value="Годовой безлимит">🌟 Годовой безлимит</option>
                            <option value="Разовое">🔑 Разовое</option>
                            <option value="Персональное">👤 Персональное</option>
                        </select>
                    </div>
                    
                    <!-- Срок действия (не редактируется, только для информации) -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">
                            <i class="fas fa-clock text-gray-400 mr-2"></i>Срок действия
                        </label>
                        <div class="px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-gray-700" id="durationDisplay">
                            Выберите тариф
                        </div>
                    </div>
                </div>

                <!-- Дата регистрации и расчет окончания -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">
                            <i class="fas fa-calendar-plus text-gray-400 mr-2"></i>Дата регистрации
                        </label>
                        <input type="date" 
                               id="startDate"
                               required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">
                            <i class="fas fa-calendar-check text-gray-400 mr-2"></i>Действует до
                        </label>
                        <div class="px-4 py-3 bg-green-50 border border-green-200 rounded-lg text-green-700 font-bold" id="endDateDisplay">
                            —
                        </div>
                    </div>
                </div>

                <!-- Скрытое поле для отправки в БД -->
                <input type="hidden" id="validUntil" name="validUntil">

                <!-- Кнопка отправки -->
                <button type="submit" 
                        id="submitBtn"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-lg transition-colors text-lg flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i>
                    Сохранить клиента
                </button>
            </form>

            <!-- Уведомление -->
            <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform transition-transform duration-300 translate-y-20">
                <!-- Текст уведомления -->
            </div>
        </div>
    </div>

    <script>
        // ===== НАСТРОЙКИ SUPABASE =====
        const supabaseUrl = 'https://agvskzcbrtsuesuaednj.supabase.co';
        const supabaseAnonKey = 'sb_publishable_dsBU1xpzb7vciVPkFccVDg_qmAFr2Yy';
        supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

        // Соответствие тарифов и сроков (в днях)
        const tariffDurations = {
            'Стандарт на месяц': 30,
            'Школьный на месяц': 30,
            'Халявный месяц': 30,
            '3 месяца': 90,
            'Полугодовой безлимит': 180,
            'Годовой безлимит': 365,
            'Разовое': 1,
            'Персональное': 365
        };

        let toastTimeout;

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('translate-y-20');
            toast.classList.add('translate-y-0');
            
            if (isError) {
                toast.classList.add('bg-red-600');
                toast.classList.remove('bg-gray-800');
            } else {
                toast.classList.add('bg-gray-800');
                toast.classList.remove('bg-red-600');
            }
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20');
                toast.classList.remove('translate-y-0');
            }, 3000);
        }

        // Функция обновления отображения срока
        function updateDurationDisplay() {
            const tariff = document.getElementById('tariff').value;
            const durationDisplay = document.getElementById('durationDisplay');
            
            if (tariff && tariffDurations[tariff]) {
                const days = tariffDurations[tariff];
                
                // Форматируем вывод
                if (days === 1) durationDisplay.textContent = '1 день';
                else if (days < 5) durationDisplay.textContent = `${days} дня`;
                else if (days < 21) durationDisplay.textContent = `${days} дней`;
                else if (days === 30) durationDisplay.textContent = '1 месяц';
                else if (days === 90) durationDisplay.textContent = '3 месяца';
                else if (days === 180) durationDisplay.textContent = '6 месяцев';
                else if (days === 365) durationDisplay.textContent = '1 год';
                else durationDisplay.textContent = `${days} дней`;
            } else {
                durationDisplay.textContent = 'Выберите тариф';
            }
            
            calculateEndDate();
        }

        // Расчет даты окончания
        function calculateEndDate() {
            const startDate = document.getElementById('startDate').value;
            const tariff = document.getElementById('tariff').value;
            const endDateDisplay = document.getElementById('endDateDisplay');
            const validUntil = document.getElementById('validUntil');
            
            if (startDate && tariff && tariffDurations[tariff]) {
                const days = tariffDurations[tariff];
                const date = new Date(startDate);
                date.setDate(date.getDate() + days);
                
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const endDate = `${year}-${month}-${day}`;
                
                // Форматируем для отображения по-русски
                const rusDate = date.toLocaleDateString('ru-RU');
                endDateDisplay.textContent = rusDate;
                
                // Сохраняем в скрытое поле для БД
                validUntil.value = endDate;
                
                return endDate;
            } else {
                endDateDisplay.textContent = '—';
                validUntil.value = '';
                return null;
            }
        }

        // Обработка формы
        document.getElementById('clientForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Сохранение...';
            submitBtn.disabled = true;

            try {
                // Получаем данные из формы
                const fullName = document.getElementById('fullName').value.trim();
                const phoneNumber = document.getElementById('phoneNumber').value.trim();
                const tariff = document.getElementById('tariff').value;
                const validUntil = document.getElementById('validUntil').value;

                // Базовая валидация
                if (!fullName || !phoneNumber || !tariff || !validUntil) {
                    throw new Error('Все поля обязательны для заполнения');
                }

                // Сохраняем в Supabase
                const { data, error } = await supabase
                    .from('clients')
                    .insert([
                        {
                            full_name: fullName,
                            phone_number: phoneNumber,
                            tariff: tariff,
                            valid_until: validUntil
                        }
                    ])
                    .select();

                if (error) throw error;

                // Успех - показываем уведомление и очищаем форму
                showToast('✅ Клиент успешно добавлен!');
                document.getElementById('clientForm').reset();
                
                // Сбрасываем даты
                const today = new Date();
                const todayStr = today.toISOString().split('T')[0];
                document.getElementById('startDate').value = todayStr;
                document.getElementById('tariff').value = '';
                updateDurationDisplay();

            } catch (error) {
                console.error('Ошибка:', error);
                showToast('❌ Ошибка: ' + error.message, true);
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // Слушатели изменений
        document.getElementById('tariff').addEventListener('change', function() {
            updateDurationDisplay();
        });

        document.getElementById('startDate').addEventListener('change', function() {
            calculateEndDate();
        });

        // Устанавливаем сегодняшнюю дату по умолчанию
        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];
        document.getElementById('startDate').value = todayStr;
        document.getElementById('startDate').min = todayStr; // нельзя выбрать прошлые даты

        // Обновляем отображение при загрузке
        updateDurationDisplay();
    </script>
</body>
</html>
